<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Photo Montage Tour</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0a0a0a; overflow: hidden; font-family: "Segoe UI", system-ui, sans-serif; }
    #stage {
      width: 100vw;
      height: calc(100vh - 56px);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    #frame {
      position: relative;
      height: 100%;
      max-width: 100%;
      display: inline-block;
      line-height: 0;
    }
    #scene-image {
      display: block;
      height: 100%;
      width: auto;
      max-width: 100%;
      object-fit: contain;
      user-select: none;
      pointer-events: none;
    }
    .hotspot-layer {
      position: absolute;
      left: 0; top: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      overflow: visible;
    }
    .hotspot-layer .poly-hit {
      fill: rgba(59, 130, 246, 0.35);
      stroke: rgba(147, 197, 253, 0.9);
      stroke-width: 0.4;
      cursor: pointer;
      pointer-events: all;
      transition: fill 0.15s;
    }
    .hotspot-layer .poly-hit:hover { fill: rgba(59, 130, 246, 0.55); }
    .marker {
      position: absolute;
      width: var(--pin-size);
      height: var(--pin-size);
      margin-left: calc(var(--pin-size) / -2);
      margin-top: calc(var(--pin-size) * -1);
      cursor: pointer;
      z-index: 5;
      pointer-events: auto;
      transform-origin: center bottom;
    }
    .marker:hover { transform: scale(1.1); z-index: 6; }
    .marker .pin-visual {
      position: absolute; inset: 0;
      display: flex; align-items: flex-end; justify-content: center;
      pointer-events: none;
    }
    .marker.builtin .pin-dot {
      width: calc(var(--pin-size) * 0.45);
      height: calc(var(--pin-size) * 0.45);
      background: #ef4444;
      border: 3px solid #fff;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      box-shadow: 0 3px 10px rgba(0,0,0,0.45);
    }
    .marker.custom .pin-img {
      width: 100%; height: 100%; object-fit: contain;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
    }
    .marker .label {
      position: absolute; left: 50%; bottom: 100%;
      transform: translateX(-50%);
      margin-bottom: 6px;
      background: rgba(0,0,0,0.85); color: #fff;
      padding: 0.25em 0.55em; border-radius: 4px;
      font-size: var(--label-size);
      white-space: nowrap;
      opacity: 0; transition: opacity 0.15s;
      pointer-events: none;
    }
    .marker:hover .label { opacity: 1; }
    #breadcrumb {
      position: fixed; top: 12px; left: 12px; z-index: 10;
      background: rgba(0,0,0,0.65); color: #eee;
      padding: 0.35rem 0.6rem; border-radius: 6px;
      font-size: calc(var(--label-size) * 0.95);
      max-width: 90vw;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    #fade {
      position: fixed; inset: 0; background: #000;
      opacity: 0; pointer-events: none; z-index: 20;
      transition: opacity 0.35s ease;
    }
    #fade.on { opacity: 1; pointer-events: all; }
    #nav-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 56px;
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      gap: 8px;
      padding: 6px 10px;
      background: linear-gradient(to top, rgba(0,0,0,0.92), rgba(0,0,0,0.75));
      border-top: 1px solid rgba(255,255,255,0.12);
      z-index: 15;
    }
    #nav-center {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: stretch;
      gap: 4px;
      min-width: 0;
    }
    #nav-map {
      flex-shrink: 0;
      display: flex;
      align-items: stretch;
      padding-left: 6px;
      border-left: 1px solid rgba(255,255,255,0.15);
    }
    #nav-bar .nav-btn {
      flex: 1;
      max-width: 140px;
      min-width: 0;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      background: rgba(40,50,70,0.85);
      color: #eee;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      padding: 4px 6px;
      font-size: calc(var(--label-size) * 0.85);
      transition: background 0.15s, transform 0.1s;
    }
    #nav-bar .nav-btn:hover:not(:disabled) {
      background: rgba(59, 130, 246, 0.55);
      transform: translateY(-1px);
    }
    #nav-bar .nav-btn:disabled {
      opacity: 0.35;
      cursor: default;
    }
    #nav-bar .nav-btn .glyph {
      font-size: calc(var(--label-size) * 1.35);
      line-height: 1;
    }
    #nav-bar .nav-btn img.nav-icon {
      width: calc(var(--label-size) * 1.5);
      height: calc(var(--label-size) * 1.5);
      object-fit: contain;
    }
    #nav-bar .nav-btn.map-btn {
      flex: 0 0 auto;
      min-width: 72px;
      max-width: 110px;
      background: rgba(59, 130, 246, 0.2);
      border-color: rgba(59, 130, 246, 0.5);
    }
    #nav-bar .nav-btn.map-btn:hover:not(:disabled) {
      background: rgba(59, 130, 246, 0.65);
    }
  </style>
</head>

    const img = document.getElementById("scene-image");
    const frame = document.getElementById("frame");
    const layer = document.getElementById("hotspot-layer");
    const fade = document.getElementById("fade");
    const crumb = document.getElementById("breadcrumb");
    const navCenter = document.getElementById("nav-center");
    const navMap = document.getElementById("nav-map");
    const pinBase = PROJECT.pinSize || 48;
    const labelBase = PROJECT.labelSize || 14;
    document.documentElement.style.setProperty("--pin-size", pinBase + "px");
    document.documentElement.style.setProperty("--label-size", labelBase + "px");

    function sceneById(id) { return PROJECT.scenes.find(s => s.id === id); }
    function iconPath(id) {
      if (!id || id === BUILTIN) return null;
      return PROJECT.icons && PROJECT.icons[id] ? PROJECT.icons[id] : null;
    }

    function navigateTo(targetId, push) {
      if (!targetId || !sceneById(targetId)) return;
      go(targetId, push);
    }

    function renderHotspots(scene) {
      frame.querySelectorAll(".marker").forEach(el => el.remove());
      layer.innerHTML = "";
      if (!img.naturalWidth) return;

      (scene.markers || []).forEach(m => {
        const pinSize = m.pinSize || pinBase;
        const labelSize = Math.round(labelBase * (m.labelScale || 1));

        if (m.type === "polygon" && m.points && m.points.length >= 3) {
          const poly = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
          poly.setAttribute("class", "poly-hit");
          poly.setAttribute("points", m.points.map(p => (p.x * 100) + "," + (p.y * 100)).join(" "));
          poly.addEventListener("click", (e) => {
            e.stopPropagation();
            navigateTo(m.targetSceneId, true);
          });
          layer.appendChild(poly);
          return;
        }

        const iconId = m.iconId || PROJECT.defaultIconId || BUILTIN;
        const customSrc = iconPath(iconId);
        const el = document.createElement("div");
        el.className = "marker " + (customSrc ? "custom" : "builtin");
        el.style.left = (m.x * 100) + "%";
        el.style.top = (m.y * 100) + "%";
        el.style.setProperty("--pin-size", pinSize + "px");
        el.style.setProperty("--label-size", labelSize + "px");
        const vis = document.createElement("div");
        vis.className = "pin-visual";
        if (customSrc) {
          const pi = document.createElement("img");
          pi.className = "pin-img";
          pi.src = customSrc;
          vis.appendChild(pi);
        } else {
          const dot = document.createElement("div");
          dot.className = "pin-dot";
          vis.appendChild(dot);
        }
        el.appendChild(vis);
        const lab = document.createElement("span");
        lab.className = "label";
        lab.textContent = m.label || "Pin";
        el.appendChild(lab);
        el.addEventListener("click", (e) => {
          e.stopPropagation();
          navigateTo(m.targetSceneId, true);
        });
        frame.appendChild(el);
      });
    }

    function createNavButton(item, glyph, isMap) {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "nav-btn" + (isMap ? " map-btn" : "");
      const hasTarget = item.targetSceneId && sceneById(item.targetSceneId);
      btn.disabled = !hasTarget;
      const customSrc = iconPath(item.iconId);
      if (customSrc) {
        const ic = document.createElement("img");
        ic.className = "nav-icon";
        ic.src = customSrc;
        ic.alt = "";
        btn.appendChild(ic);
      } else {
        const g = document.createElement("span");
        g.className = "glyph";
        g.textContent = glyph;
        btn.appendChild(g);
      }
      const cap = document.createElement("span");
      cap.textContent = item.label || (isMap ? "Map" : item.slot);
      btn.appendChild(cap);
      btn.addEventListener("click", () => navigateTo(item.targetSceneId, true));
      return btn;
    }

    function renderNavBar(scene) {
      navCenter.innerHTML = "";
      navMap.innerHTML = "";
      const bar = scene.bottomBar || [];
      bar.forEach(item => {
        if (!item.enabled) return;
        navCenter.appendChild(createNavButton(item, SLOT_GLYPH[item.slot] || "•", false));
      });
      const mapBtn = scene.mapButton;
      if (mapBtn && mapBtn.enabled !== false) {
        navMap.appendChild(createNavButton(mapBtn, MAP_GLYPH, true));
      }
    }

    function updateCrumb() {
      crumb.textContent = history.map(id => (sceneById(id)?.name || "?")).join(" → ");
      crumb.hidden = history.length < 2;
    }

    function showScene(id) {
      const scene = sceneById(id);
      if (!scene) return;
      currentId = id;
      const draw = () => {
        const s = sceneById(currentId);
        if (!img.naturalWidth || !s) return;
        renderHotspots(s);
        renderNavBar(s);
      };
      img.onload = draw;
      img.src = scene.image;
      if (img.complete && img.naturalWidth) draw();
      updateCrumb();
    }

    function go(id, push) {
      if (!sceneById(id)) return;
      fade.classList.add("on");
      setTimeout(() => {
        if (push) {
          if (history[history.length - 1] !== id) history.push(id);
        } else {
          history = [id];
        }
        showScene(id);
        setTimeout(() => fade.classList.remove("on"), 60);
      }, 280);
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && history.length > 1) {
        history.pop();
        go(history[history.length - 1], false);
      }
    });

    showScene(currentId);

    window.addEventListener("resize", () => {
      const s = sceneById(currentId);
      if (s && img.naturalWidth) renderHotspots(s);
    });
  </script>
</body>
</html>
